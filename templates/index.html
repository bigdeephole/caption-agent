<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caption Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #121212;
    --panel: #1b1b1b;
    --panel-line: #2c2c2c;
    --text: #f3f1ea;
    --text-dim: #8f8b81;
    --accent: #d7ff3e;
    --accent-dim: #9aa832;
    --danger: #ff6b6b;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 36px 16px 60px;
  }

  header {
    width: 100%;
    max-width: 460px;
    margin-bottom: 22px;
  }

  h1 {
    font-size: 1.7rem;
    font-weight: 600;
    margin: 0 0 6px;
    letter-spacing: -0.01em;
  }

  header p {
    color: var(--text-dim);
    font-size: 0.9rem;
    margin: 0;
  }

  main {
    width: 100%;
    max-width: 460px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* --- viewfinder / preview panel --- */
  .viewfinder {
    background: var(--panel);
    border: 1px solid var(--panel-line);
    border-radius: 16px;
    padding: 14px;
  }

  .frame {
    position: relative;
    width: 100%;
    aspect-ratio: 4 / 5;
    border-radius: 10px;
    overflow: hidden;
    background: repeating-linear-gradient(135deg, #1f1f1f, #1f1f1f 10px, #191919 10px, #191919 20px);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: 1.5px dashed var(--panel-line);
  }

  .frame.has-media {
    cursor: default;
    border-style: solid;
    border-color: var(--panel-line);
  }

  .frame .placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    color: var(--text-dim);
    text-align: center;
    padding: 20px;
  }

  .frame .placeholder svg {
    width: 34px;
    height: 34px;
    opacity: 0.7;
  }

  .frame .placeholder .cta {
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    color: var(--accent);
  }

  .frame img,
  .frame video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .frame .corner-tag {
    position: absolute;
    top: 10px;
    left: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    background: rgba(0,0,0,0.55);
    color: var(--accent);
    padding: 3px 8px;
    border-radius: 5px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .frame .clear-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: rgba(0,0,0,0.55);
    border: none;
    color: #fff;
    font-size: 0.9rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .frame .clear-btn:hover { background: rgba(0,0,0,0.8); }

  input[type="file"] { display: none; }

  .filename {
    margin-top: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: var(--text-dim);
    text-align: center;
    word-break: break-all;
  }

  /* --- inputs --- */
  .context-input {
    width: 100%;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.9rem;
    padding: 13px 14px;
    border-radius: 10px;
    border: 1px solid var(--panel-line);
    background: var(--panel);
    color: var(--text);
  }

  .context-input::placeholder { color: var(--text-dim); }
  .context-input:focus { outline: none; border-color: var(--accent); }

  .go-btn {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 0.95rem;
    color: #111;
    background: var(--accent);
    border: none;
    padding: 15px 20px;
    border-radius: 10px;
    cursor: pointer;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: opacity 0.15s ease, transform 0.1s ease;
  }

  .go-btn:hover:not(:disabled) { opacity: 0.9; }
  .go-btn:active:not(:disabled) { transform: scale(0.99); }
  .go-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .spinner {
    width: 14px;
    height: 14px;
    border: 2px solid rgba(0,0,0,0.25);
    border-top-color: #111;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  .go-btn.loading .spinner { display: inline-block; }
  .go-btn.loading .go-label::after { content: 'lagi mikir...'; }
  .go-btn.loading .go-label { font-size: 0; }
  .go-btn.loading .go-label::after { font-size: 0.95rem; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .status {
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    color: var(--danger);
    text-align: center;
    min-height: 16px;
  }

  /* --- result --- */
  .result {
    display: none;
    background: var(--panel);
    border: 1px solid var(--panel-line);
    border-radius: 14px;
    padding: 18px;
    animation: rise 0.25s ease;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--accent);
    margin-bottom: 10px;
  }

  .caption-text {
    font-size: 1rem;
    line-height: 1.55;
    white-space: pre-wrap;
    margin-bottom: 14px;
  }

  .result-actions {
    display: flex;
    gap: 8px;
  }

  .result-actions button {
    flex: 1;
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    padding: 9px;
    border-radius: 8px;
    border: 1px solid var(--panel-line);
    background: transparent;
    color: var(--text);
    cursor: pointer;
  }

  .result-actions button:hover { border-color: var(--accent); color: var(--accent); }

  footer {
    margin-top: 30px;
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    color: var(--text-dim);
    text-align: center;
    max-width: 400px;
  }
</style>
</head>
<body>

  <header>
    <h1>Caption Generator</h1>
    <p>upload foto atau video, biar temen lo yang mikirin kata-katanya.</p>
  </header>

  <main>
    <form id="captionForm">
      <div class="viewfinder">
        <div class="frame" id="frame">
          <div class="placeholder" id="placeholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="6" width="18" height="14" rx="2"/>
              <path d="M8 6l1.5-2.5h5L16 6"/>
              <circle cx="12" cy="13" r="3.5"/>
            </svg>
            <span>foto atau video lo</span>
            <span class="cta">ketuk buat pilih file</span>
          </div>
        </div>
        <div class="filename" id="filename"></div>
        <input type="file" id="fileInput" name="file" accept="image/*,video/*">
      </div>

      <div style="height: 4px;"></div>
      <input type="text" class="context-input" id="contextInput" name="context" placeholder="konteks tambahan (opsional)">

      <div style="height: 12px;"></div>
      <button type="submit" class="go-btn" id="goBtn" disabled>
        <span class="spinner"></span>
        <span class="go-label">bikinin caption</span>
      </button>
      <div class="status" id="statusText"></div>
    </form>

    <div class="result" id="result">
      <div class="result-label">caption jadi</div>
      <div class="caption-text" id="captionText"></div>
      <div class="result-actions">
        <button type="button" id="copyBtn">salin</button>
        <button type="button" id="retryBtn">bikin lagi</button>
      </div>
    </div>
  </main>

  <footer>
   File lo dihapus dari server abis caption jadi.
  </footer>

<script>
  const frame = document.getElementById('frame');
  const placeholder = document.getElementById('placeholder');
  const fileInput = document.getElementById('fileInput');
  const filenameEl = document.getElementById('filename');
  const contextInput = document.getElementById('contextInput');
  const form = document.getElementById('captionForm');
  const goBtn = document.getElementById('goBtn');
  const statusText = document.getElementById('statusText');
  const result = document.getElementById('result');
  const captionText = document.getElementById('captionText');
  const copyBtn = document.getElementById('copyBtn');
  const retryBtn = document.getElementById('retryBtn');

  let currentFile = null;
  let mediaEl = null;

  function openPicker(e) {
    if (e) e.preventDefault();
    fileInput.click();
  }
  frame.addEventListener('click', (e) => {
    if (!frame.classList.contains('has-media')) openPicker(e);
  });

  function renderPreview(file) {
    if (mediaEl) mediaEl.remove();

    const url = URL.createObjectURL(file);
    const isVideo = file.type.startsWith('video');

    mediaEl = document.createElement(isVideo ? 'video' : 'img');
    mediaEl.src = url;
    if (isVideo) {
      mediaEl.controls = true;
      mediaEl.muted = true;
    }

    placeholder.style.display = 'none';
    frame.classList.add('has-media');
    frame.appendChild(mediaEl);

    const tag = document.createElement('span');
    tag.className = 'corner-tag';
    tag.textContent = isVideo ? 'video' : 'foto';
    frame.appendChild(tag);

    const clearBtn = document.createElement('button');
    clearBtn.type = 'button';
    clearBtn.className = 'clear-btn';
    clearBtn.innerHTML = '&times;';
    clearBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      resetPicker();
    });
    frame.appendChild(clearBtn);

    filenameEl.textContent = file.name;
    goBtn.disabled = false;
    result.style.display = 'none';
    statusText.textContent = '';
  }

  function resetPicker() {
    currentFile = null;
    fileInput.value = '';
    frame.classList.remove('has-media');
    frame.querySelectorAll('img, video, .corner-tag, .clear-btn').forEach(el => el.remove());
    placeholder.style.display = 'flex';
    filenameEl.textContent = '';
    goBtn.disabled = true;
    result.style.display = 'none';
  }

  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    if (!file) return;
    currentFile = file;
    renderPreview(file);
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!currentFile) return;

    goBtn.disabled = true;
    goBtn.classList.add('loading');
    statusText.textContent = '';
    result.style.display = 'none';

    const formData = new FormData();
    formData.append('file', currentFile);
    formData.append('context', contextInput.value.trim());

    try {
      const res = await fetch('/api/caption', { method: 'POST', body: formData });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Gagal bikin caption.');

      captionText.textContent = data.caption;
      result.style.display = 'block';
    } catch (err) {
      statusText.textContent = 'error: ' + err.message;
    } finally {
      goBtn.disabled = false;
      goBtn.classList.remove('loading');
    }
  });

  retryBtn.addEventListener('click', () => form.requestSubmit());

  copyBtn.addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(captionText.textContent);
      copyBtn.textContent = 'kesalin!';
      setTimeout(() => { copyBtn.textContent = 'salin'; }, 1500);
    } catch (e) {
      statusText.textContent = 'gagal nyalin, select manual aja';
    }
  });
</script>
</body>
</html>
